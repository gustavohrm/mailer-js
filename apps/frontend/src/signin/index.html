<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mailer.js</title>
    <link rel="stylesheet" href="../_ui/styles/index.css" />
    <script type="module" src="../_ui/components/index.ts"></script>
    <script type="module" src="../_ui/scripts/index.ts"></script>
  </head>
  <body class="items-center justify-center">
    <main
      class="bg-surface flex w-full max-w-sm flex-col gap-4 rounded-2xl p-8"
    >
      <h1 class="text-2xl font-bold">Sign in to your account</h1>
      <form id="setup-form" class="flex flex-col gap-4">
        <app-input placeholder="Email" label="Email" type="email"></app-input>
        <app-input
          placeholder="********"
          label="Password"
          type="password"
        ></app-input>
        <button id="signin-submit" class="primary-btn w-full" type="submit">
          Sign in
        </button>
      </form>
    </main>
  </body>
</html>
